<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Argonavtebi · ქართული საცეკვაო ქსელი</title>
  <!-- Tailwind CSS + Font Awesome + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background-color: #f0f2f5; }
    .post-card { transition: all 0.2s ease; }
    .post-card:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -12px rgba(0,0,0,0.15); }
    .sidebar-item:hover { background-color: #e4e6e9; }
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: #e4e6e9; border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #bcc0c4; border-radius: 10px; }
    .verified-badge { color: #1da1f2; margin-left: 4px; font-size: 0.8rem; }
    .avatar-upload-overlay { transition: opacity 0.2s; }
  </style>
</head>
<body class="bg-[#f0f2f5]">

<div id="appRoot" class="flex flex-col h-screen"></div>

<script>
  // ----------------------------------------------
  // ARGONAVTEBI - სრულფასოვანი სოციალური ქსელი
  // ფუნქციები: რეგისტრაცია, პროფილის ფოტო, პოსტები, ლაიქები, კომენტარები
  // მონაცემები ინახება localStorage-ში
  // ----------------------------------------------
  
  // მონაცემთა ბაზის სტრუქტურა
  let db = {
    users: [],      // { id, email, password, name, avatar, verified, createdAt }
    posts: [],      // { id, userId, content, createdAt }
    likes: [],      // { id, postId, userId }
    comments: []    // { id, postId, userId, content, createdAt }
  };

  let currentUser = null;         // შესული მომხმარებელი
  let activeCommentPostId = null; // რომელი პოსტის კომენტარებია გახსნილი
  
  // Helper: localStorage-ში შენახვა
  function saveDatabase() {
    localStorage.setItem('argonavtebi_db', JSON.stringify(db));
  }

  // მონაცემთა ბაზის ინიციალიზაცია – იქმნება მხოლოდ ოფიციალური ანგარიში (Argonavtebi)
  function initDatabase() {
    const stored = localStorage.getItem('argonavtebi_db');
    if (stored) {
      db = JSON.parse(stored);
    } else {
      db = { users: [], posts: [], likes: [], comments: [] };
      // ვქმნით ოფიციალურ Argonavtebi ანგარიშს verified badge-ით
      const officialId = "official_" + Date.now() + "_argon";
      const defaultAvatar = "https://ui-avatars.com/api/?background=0D8ABC&color=fff&bold=true&name=Argonavtebi";
      db.users.push({
        id: officialId,
        email: "argonavtebi@dance.ge",
        password: "argon2026",
        name: "Argonavtebi · არგონავტები",
        avatar: defaultAvatar,
        verified: true,
        createdAt: new Date().toISOString()
      });
      saveDatabase();
    }
    // დარწმუნდეთ, რომ official ანგარიში ყოველთვის არსებობს (მაგ. წაშლის შემთხვევაში)
    const officialExists = db.users.find(u => u.verified === true && u.email === "argonavtebi@dance.ge");
    if (!officialExists) {
      const defaultAvatar = "https://ui-avatars.com/api/?background=0D8ABC&color=fff&bold=true&name=Argonavtebi";
      db.users.push({
        id: "official_" + Date.now() + "_argon",
        email: "argonavtebi@dance.ge",
        password: "argon2026",
        name: "Argonavtebi · არგონავტები",
        avatar: defaultAvatar,
        verified: true,
        createdAt: new Date().toISOString()
      });
      saveDatabase();
    }
  }

  // მომხმარებლის პოვნა ID-ით
  function getUserById(id) {
    return db.users.find(u => u.id === id);
  }

  // პოსტის ლაიქების რაოდენობა
  function getPostLikesCount(postId) {
    return db.likes.filter(l => l.postId === postId).length;
  }

  // კომენტარების რაოდენობა
  function getPostCommentsCount(postId) {
    return db.comments.filter(c => c.postId === postId).length;
  }

  // კომენტარების სია პოსტისთვის (უახლესი პირველი)
  function getCommentsForPost(postId) {
    return db.comments.filter(c => c.postId === postId).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  }

  // ახალი მომხმარებლის რეგისტრაცია
  function register(email, password, name, avatarDataURL = null) {
    if (!email || !password || !name) return { success: false, message: "ყველა ველი სავალდებულოა" };
    if (db.users.find(u => u.email === email)) return { success: false, message: "ეს ელ.ფოსტა უკვე რეგისტრირებულია" };
    if (password.length < 4) return { success: false, message: "პაროლი უნდა შეიცავდეს მინიმუმ 4 სიმბოლოს" };
    
    let avatar = avatarDataURL;
    if (!avatar) {
      // default avatar from ui-avatars
      avatar = `https://ui-avatars.com/api/?background=4F46E5&color=fff&bold=true&name=${encodeURIComponent(name)}`;
    }
    const newUser = {
      id: "user_" + Date.now() + "_" + Math.random().toString(36),
      email: email,
      password: password,
      name: name,
      avatar: avatar,
      verified: false,
      createdAt: new Date().toISOString()
    };
    db.users.push(newUser);
    saveDatabase();
    return { success: true, message: "რეგისტრაცია წარმატებით დასრულდა! შედით სისტემაში." };
  }

  // შესვლა
  function login(email, password) {
    const user = db.users.find(u => u.email === email && u.password === password);
    if (!user) return { success: false, message: "ელ.ფოსტა ან პაროლი არასწორია" };
    currentUser = { ...user };
    sessionStorage.setItem('argon_current_user', JSON.stringify(currentUser));
    return { success: true };
  }

  // გამოსვლა
  function logout() {
    currentUser = null;
    sessionStorage.removeItem('argon_current_user');
    activeCommentPostId = null;
    renderApp();
  }

  // პროფილის ფოტოს განახლება
  function updateProfileAvatar(newAvatarDataURL) {
    if (!currentUser) return false;
    const userIndex = db.users.findIndex(u => u.id === currentUser.id);
    if (userIndex !== -1) {
      db.users[userIndex].avatar = newAvatarDataURL;
      currentUser.avatar = newAvatarDataURL;
      saveDatabase();
      sessionStorage.setItem('argon_current_user', JSON.stringify(currentUser));
      renderApp(); // refresh whole UI
      return true;
    }
    return false;
  }

  // პროფილის სახელის განახლება
  function updateProfileName(newName) {
    if (!currentUser || !newName.trim()) return false;
    const userIndex = db.users.findIndex(u => u.id === currentUser.id);
    if (userIndex !== -1) {
      db.users[userIndex].name = newName.trim();
      currentUser.name = newName.trim();
      saveDatabase();
      sessionStorage.setItem('argon_current_user', JSON.stringify(currentUser));
      renderApp();
      return true;
    }
    return false;
  }

  // პოსტის შექმნა
  function createPost(content) {
    if (!content.trim()) return { success: false, message: "პოსტი ცარიელია" };
    const newPost = {
      id: "post_" + Date.now() + "_" + Math.random().toString(36),
      userId: currentUser.id,
      content: content.trim(),
      createdAt: new Date().toISOString()
    };
    db.posts.unshift(newPost);
    saveDatabase();
    return { success: true };
  }

  // პოსტის წაშლა (მხოლოდ ავტორი)
  function deletePost(postId) {
    const post = db.posts.find(p => p.id === postId);
    if (!post || post.userId !== currentUser.id) return false;
    db.posts = db.posts.filter(p => p.id !== postId);
    db.likes = db.likes.filter(l => l.postId !== postId);
    db.comments = db.comments.filter(c => c.postId !== postId);
    saveDatabase();
    return true;
  }

  // ლაიქის ჩართვა/გამორთვა
  function toggleLike(postId) {
    const existing = db.likes.find(l => l.userId === currentUser.id && l.postId === postId);
    if (existing) {
      db.likes = db.likes.filter(l => l.id !== existing.id);
    } else {
      db.likes.push({
        id: "like_" + Date.now() + "_" + Math.random().toString(36),
        postId: postId,
        userId: currentUser.id
      });
    }
    saveDatabase();
    renderFeed(); // refresh feed to update like count/icon
  }

  // კომენტარის დამატება
  function addComment(postId, content) {
    if (!content.trim()) return false;
    const newComment = {
      id: "cmt_" + Date.now() + "_" + Math.random().toString(36),
      postId: postId,
      userId: currentUser.id,
      content: content.trim(),
      createdAt: new Date().toISOString()
    };
    db.comments.push(newComment);
    saveDatabase();
    return true;
  }

  // კომენტარის წაშლა (მხოლოდ ავტორი)
  function deleteComment(commentId) {
    const comment = db.comments.find(c => c.id === commentId);
    if (!comment || comment.userId !== currentUser.id) return false;
    db.comments = db.comments.filter(c => c.id !== commentId);
    saveDatabase();
    return true;
  }

  // ----------------------------------------------
  // UI რენდერის ფუნქციები
  // ----------------------------------------------
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function formatDate(isoString) {
    if (!isoString) return 'ახლახანს';
    const date = new Date(isoString);
    const now = new Date();
    const diffSec = Math.floor((now - date) / 1000);
    if (diffSec < 60) return 'ახლახანს';
    const diffMin = Math.floor(diffSec / 60);
    if (diffMin < 60) return `${diffMin} წუთის წინ`;
    const diffHour = Math.floor(diffMin / 60);
    if (diffHour < 24) return `${diffHour} საათის წინ`;
    const diffDay = Math.floor(diffHour / 24);
    if (diffDay < 7) return `${diffDay} დღის წინ`;
    return date.toLocaleDateString('ka-GE');
  }

  // კომენტარების სექციის რენდერი
  function renderCommentSection(postId) {
    const comments = getCommentsForPost(postId);
    let html = `<div class="mt-4 pt-3 border-t border-gray-100 bg-gray-50 rounded-xl p-3">
      <div class="flex gap-2 mb-3">
        <img src="${currentUser.avatar}" class="w-8 h-8 rounded-full object-cover border">
        <div class="flex-1 flex gap-2">
          <input type="text" id="commentInput_${postId}" placeholder="დაწერე კომენტარი..." class="flex-1 bg-white border border-gray-200 rounded-full px-3 py-1.5 text-sm focus:outline-none focus:border-blue-400">
          <button class="submit-comment-btn bg-blue-600 text-white text-xs px-3 py-1 rounded-full hover:bg-blue-700" data-id="${postId}">გაგზავნა</button>
        </div>
      </div>`;
    if (comments.length === 0) {
      html += `<p class="text-xs text-gray-400 text-center py-2">კომენტარები ჯერ არ არის</p>`;
    } else {
      html += `<div class="space-y-3 max-h-64 overflow-y-auto custom-scroll">`;
      for (let cmt of comments) {
        const author = getUserById(cmt.userId);
        if (!author) continue;
        const isOwn = currentUser.id === cmt.userId;
        html += `
          <div class="bg-white rounded-xl p-2 flex gap-2">
            <img src="${author.avatar}" class="w-7 h-7 rounded-full object-cover">
            <div class="flex-1">
              <div class="flex items-center gap-1 flex-wrap">
                <span class="text-xs font-semibold">${escapeHtml(author.name)}</span>
                ${author.verified ? '<i class="fas fa-check-circle text-blue-500 text-[10px]"></i>' : ''}
                <span class="text-[10px] text-gray-400">${formatDate(cmt.createdAt)}</span>
              </div>
              <p class="text-sm text-gray-700">${escapeHtml(cmt.content)}</p>
            </div>
            ${isOwn ? `<i class="fas fa-trash-alt text-gray-300 hover:text-red-500 text-xs cursor-pointer delete-comment-btn" data-comment-id="${cmt.id}"></i>` : ''}
          </div>
        `;
      }
      html += `</div>`;
    }
    html += `</div>`;
    return html;
  }

  // Feed-ის რენდერი
  function renderFeed() {
    const feedContainer = document.getElementById('postsFeed');
    if (!feedContainer) return;
    if (db.posts.length === 0) {
      feedContainer.innerHTML = `<div class="bg-white rounded-2xl p-8 text-center text-gray-500"><i class="fas fa-music text-4xl mb-2"></i><p>ჯერ არ არის პოსტები. იყავი პირველი!</p></div>`;
      return;
    }
    let html = '';
    for (let post of db.posts) {
      const author = getUserById(post.userId);
      if (!author) continue;
      const isLiked = db.likes.some(l => l.userId === currentUser.id && l.postId === post.id);
      const likeClass = isLiked ? 'text-blue-600' : 'text-gray-500';
      const likeIcon = isLiked ? 'fas fa-thumbs-up' : 'far fa-thumbs-up';
      const likeCount = getPostLikesCount(post.id);
      const commentCount = getPostCommentsCount(post.id);
      const isAuthor = currentUser.id === post.userId;
      const showComments = (activeCommentPostId === post.id);
      html += `
        <div class="post-card bg-white rounded-2xl shadow-sm p-4 mb-4" data-post-id="${post.id}">
          <div class="flex justify-between items-start">
            <div class="flex gap-3">
              <img src="${author.avatar}" class="w-10 h-10 rounded-full object-cover border shadow-sm">
              <div>
                <div class="flex items-center flex-wrap">
                  <span class="font-semibold text-gray-800">${escapeHtml(author.name)}</span>
                  ${author.verified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}
                </div>
                <p class="text-xs text-gray-400"><i class="far fa-clock mr-1"></i>${formatDate(post.createdAt)}</p>
              </div>
            </div>
            ${isAuthor ? `<i class="fas fa-trash-alt text-gray-400 hover:text-red-500 cursor-pointer delete-post-btn" data-id="${post.id}"></i>` : ''}
          </div>
          <div class="mt-3 text-gray-800 text-[15px] leading-relaxed whitespace-pre-line">${escapeHtml(post.content)}</div>
          <div class="flex justify-between items-center mt-4 text-gray-500 text-sm border-t border-gray-100 pt-3">
            <div><i class="fas fa-thumbs-up text-blue-500 mr-1"></i> <span class="like-count">${likeCount}</span></div>
            <div class="cursor-pointer toggle-comments-btn font-medium hover:text-gray-700" data-id="${post.id}"><i class="far fa-comment-dots mr-1"></i> ${commentCount} კომენტარი</div>
          </div>
          <div class="flex justify-around mt-2 pt-1 border-t border-gray-100">
            <button class="like-post-btn flex items-center gap-2 py-1.5 px-4 rounded-lg hover:bg-gray-100 transition font-medium ${likeClass}" data-id="${post.id}"><i class="${likeIcon} text-lg"></i> მოწონება</button>
            <button class="toggle-comments-btn flex items-center gap-2 py-1.5 px-4 rounded-lg hover:bg-gray-100 transition text-gray-600" data-id="${post.id}"><i class="far fa-comment text-lg"></i> კომენტარი</button>
          </div>
          ${showComments ? renderCommentSection(post.id) : ''}
        </div>
      `;
    }
    feedContainer.innerHTML = html;
    // attach event listeners
    document.querySelectorAll('.like-post-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); toggleLike(btn.dataset.id); }));
    document.querySelectorAll('.delete-post-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); if(confirm('წაშლა?')) { deletePost(btn.dataset.id); renderFeed(); } }));
    document.querySelectorAll('.toggle-comments-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const pid = btn.dataset.id;
        activeCommentPostId = (activeCommentPostId === pid) ? null : pid;
        renderFeed();
      });
    });
    document.querySelectorAll('.submit-comment-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const pid = btn.dataset.id;
        const input = document.getElementById(`commentInput_${pid}`);
        if (input && input.value.trim()) {
          addComment(pid, input.value);
          input.value = '';
          activeCommentPostId = pid;
          renderFeed();
        } else alert('დაწერეთ კომენტარი');
      });
    });
    document.querySelectorAll('.delete-comment-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const commentId = btn.dataset.commentId;
        if (confirm('კომენტარის წაშლა?')) {
          deleteComment(commentId);
          renderFeed();
        }
      });
    });
  }

  // პროფილის მოდალური ფანჯარა (ფოტოსა და სახელის შესაცვლელად)
  function showProfileModal() {
    const modalHtml = `
      <div id="profileModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">პროფილის რედაქტირება</h2>
            <i class="fas fa-times cursor-pointer text-gray-500 hover:text-gray-700" id="closeModalBtn"></i>
          </div>
          <div class="flex flex-col items-center gap-4">
            <div class="relative group cursor-pointer" id="avatarUploadTrigger">
              <img src="${currentUser.avatar}" class="w-24 h-24 rounded-full object-cover border-4 border-blue-100 shadow">
              <div class="absolute bottom-0 right-0 bg-blue-600 rounded-full p-1.5 text-white"><i class="fas fa-camera text-xs"></i></div>
            </div>
            <input type="file" id="avatarFileInput" accept="image/*" class="hidden">
            <div class="w-full">
              <label class="block text-sm font-medium text-gray-700">სახელი</label>
              <input type="text" id="profileNameInput" value="${escapeHtml(currentUser.name)}" class="w-full border rounded-xl px-3 py-2 mt-1 focus:outline-none focus:border-blue-500">
            </div>
            <button id="saveProfileBtn" class="bg-blue-600 text-white w-full py-2 rounded-xl font-semibold hover:bg-blue-700">შენახვა</button>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    const modal = document.getElementById('profileModal');
    const closeModal = () => modal.remove();
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
    const fileInput = document.getElementById('avatarFileInput');
    const trigger = document.getElementById('avatarUploadTrigger');
    trigger.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = document.querySelector('#profileModal img');
          if(img) img.src = ev.target.result;
          // store temporary
          window.tempAvatar = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    });
    document.getElementById('saveProfileBtn').addEventListener('click', () => {
      const newName = document.getElementById('profileNameInput').value.trim();
      if(newName) updateProfileName(newName);
      if(window.tempAvatar) updateProfileAvatar(window.tempAvatar);
      closeModal();
    });
  }

  // მთავარი აპლიკაციის რენდერი (ავტორიზაციის მიხედვით)
  function renderApp() {
    const root = document.getElementById('appRoot');
    if (!currentUser) {
      // Login / Register view
      root.innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
          <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
            <div class="flex flex-col items-center mb-6">
              <div class="bg-gradient-to-r from-blue-600 to-indigo-600 w-14 h-14 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-ship text-white text-2xl"></i></div>
              <h1 class="text-2xl font-bold mt-2 bg-gradient-to-r from-blue-700 to-indigo-700 bg-clip-text text-transparent">Argonavtebi</h1>
              <p class="text-gray-500 text-sm">ქართული საცეკვაო ქსელი</p>
            </div>
            <div id="authTabs" class="flex border-b mb-4">
              <button id="loginTabBtn" class="flex-1 py-2 font-semibold text-blue-600 border-b-2 border-blue-600">შესვლა</button>
              <button id="registerTabBtn" class="flex-1 py-2 font-semibold text-gray-500">რეგისტრაცია</button>
            </div>
            <div id="loginForm" class="space-y-4">
              <input type="email" id="loginEmail" placeholder="ელ.ფოსტა" class="w-full border border-gray-300 rounded-xl px-4 py-2">
              <input type="password" id="loginPassword" placeholder="პაროლი" class="w-full border border-gray-300 rounded-xl px-4 py-2">
              <button id="doLoginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-xl">შესვლა</button>
            </div>
            <div id="registerForm" class="space-y-4 hidden">
              <input type="text" id="regName" placeholder="სრული სახელი" class="w-full border border-gray-300 rounded-xl px-4 py-2">
              <input type="email" id="regEmail" placeholder="ელ.ფოსტა" class="w-full border border-gray-300 rounded-xl px-4 py-2">
              <input type="password" id="regPassword" placeholder="პაროლი (მინ. 4 სიმბოლო)" class="w-full border border-gray-300 rounded-xl px-4 py-2">
              <button id="doRegisterBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-xl">რეგისტრაცია</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('loginTabBtn').addEventListener('click', () => {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginTabBtn').classList.add('text-blue-600','border-blue-600');
        document.getElementById('loginTabBtn').classList.remove('text-gray-500','border-transparent');
        document.getElementById('registerTabBtn').classList.remove('text-blue-600','border-blue-600');
        document.getElementById('registerTabBtn').classList.add('text-gray-500','border-transparent');
      });
      document.getElementById('registerTabBtn').addEventListener('click', () => {
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerTabBtn').classList.add('text-blue-600','border-blue-600');
        document.getElementById('registerTabBtn').classList.remove('text-gray-500','border-transparent');
        document.getElementById('loginTabBtn').classList.remove('text-blue-600','border-blue-600');
        document.getElementById('loginTabBtn').classList.add('text-gray-500','border-transparent');
      });
      document.getElementById('doLoginBtn').addEventListener('click', () => {
        const res = login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
        if(res.success) renderApp();
        else alert(res.message);
      });
      document.getElementById('doRegisterBtn').addEventListener('click', () => {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPassword').value;
        const res = register(email, pass, name);
        alert(res.message);
        if(res.success) document.getElementById('loginTabBtn').click();
      });
    } else {
      // Main feed view
      root.innerHTML = `
        <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-30 py-2 px-4 md:px-6 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 w-9 h-9 rounded-full flex items-center justify-center shadow"><i class="fas fa-ship text-white"></i></div>
            <span class="text-xl font-extrabold bg-gradient-to-r from-blue-700 to-indigo-700 bg-clip-text text-transparent">Argonavtebi</span>
          </div>
          <div class="flex items-center gap-4">
            <button id="profileBtn" class="flex items-center gap-2 bg-gray-100 rounded-full pl-2 pr-3 py-1 hover:bg-gray-200"><img src="${currentUser.avatar}" class="w-7 h-7 rounded-full object-cover"><span class="text-sm font-medium hidden sm:inline">${escapeHtml(currentUser.name.split(' ')[0])}</span></button>
            <button id="logoutBtn" class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-full text-sm"><i class="fas fa-sign-out-alt mr-1"></i>გამოსვლა</button>
          </div>
        </header>
        <div class="flex flex-1 overflow-hidden max-w-6xl mx-auto w-full px-4 py-5 gap-5">
          <div class="hidden md:block w-64 shrink-0 bg-white rounded-2xl shadow-sm p-4 h-fit">
            <div class="flex items-center gap-3 border-b pb-3"><i class="fas fa-flag-checkered text-red-500"></i><span class="font-bold">ოფიციალური</span></div>
            <div class="flex items-center gap-3 mt-3"><img src="${getUserById(db.users.find(u=>u.verified)?.id)?.avatar}" class="w-10 h-10 rounded-full"><div><p class="font-semibold text-sm">Argonavtebi · არგონავტები <i class="fas fa-check-circle text-blue-500 text-xs"></i></p><p class="text-xs text-gray-500">ქართული ცეკვა</p></div></div>
          </div>
          <div class="flex-1 max-w-2xl mx-auto w-full overflow-y-auto custom-scroll space-y-4 pb-20">
            <div class="bg-white rounded-2xl shadow-sm p-4">
              <div class="flex gap-3">
                <img src="${currentUser.avatar}" class="w-10 h-10 rounded-full object-cover">
                <div class="flex-1"><textarea id="newPostContent" rows="2" placeholder="რა არის ახალი საცეკვაო სამყაროში? 💃" class="w-full p-3 bg-gray-100 rounded-2xl resize-none focus:outline-none focus:border-blue-400"></textarea><div class="flex justify-end mt-2"><button id="submitPostBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm">გამოქვეყნება</button></div></div>
              </div>
            </div>
            <div id="postsFeed" class="space-y-4"></div>
          </div>
          <div class="hidden lg:block w-64 shrink-0 bg-white rounded-2xl shadow-sm p-4 text-center"><i class="fas fa-music text-3xl text-indigo-400 mb-2"></i><p class="text-sm font-semibold">იცეკვე, გააზიარე</p><p class="text-xs text-gray-500">Argonavtebi — ქართული ცეკვის ძალა</p></div>
        </div>
      `;
      document.getElementById('submitPostBtn')?.addEventListener('click', () => {
        const content = document.getElementById('newPostContent').value;
        const res = createPost(content);
        if(res.success) { document.getElementById('newPostContent').value = ''; renderFeed(); }
        else alert(res.message);
      });
      document.getElementById('logoutBtn').addEventListener('click', logout);
      document.getElementById('profileBtn').addEventListener('click', showProfileModal);
      renderFeed();
    }
  }

  // ინიციალიზაცია და ავტომატური შესვლა სესიიდან
  initDatabase();
  const savedUser = sessionStorage.getItem('argon_current_user');
  if (savedUser) {
    try {
      const parsed = JSON.parse(savedUser);
      if (db.users.find(u => u.id === parsed.id)) currentUser = parsed;
    } catch(e) {}
  }
  renderApp();
</script>
</body>
</html>
